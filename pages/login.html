<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — TabletopForge</title>
  <meta name="description" content="Sign in to your TabletopForge account to back campaigns, track orders, and manage your games." />
  <link rel="icon" type="image/svg+xml" href="../assets/images/brand-mark.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dark-mode.css" />
  <link rel="stylesheet" href="../assets/css/rtl.css" />
</head>
<body>
<div class="auth-shell">
  <div class="auth-card auth-card--wide reveal">
    <div style="text-align:center;margin-bottom:30px;">
      <div class="sec-eyebrow" style="justify-content:center;margin-bottom:18px;"><span class="ldot"></span> Backers and creators in one workspace</div>
      <div class="nav__logo-mark" style="margin:0 auto 18px;width:54px;height:54px;border-radius:16px;"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 16l-1.447.724a1 1 0 0 0-.553.894V20h12v-2.382a1 1 0 0 0-.553-.894L16 16"/><path d="M8 16V9a4 4 0 0 1 8 0v7"/><path d="M9 9h6"/><circle cx="12" cy="6" r="1"/></svg></div>
      <h1 class="auth-title" style="font-family:'Rubik',sans-serif;font-size:clamp(2rem,4vw,2.5rem);font-weight:400;margin-bottom:10px;">Welcome back</h1>
      <p class="auth-sub" style="font-size:0.96rem;max-width:420px;margin:0 auto;">Sign in to manage campaigns, track orders, check fulfilment updates, and continue exactly where you left off.</p>
    </div>

    <form style="display:flex;flex-direction:column;gap:16px;" onsubmit="return false;">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <div class="auth-row">
        <label class="auth-check"><input type="checkbox" checked /> <span>Keep me signed in</span></label>
        <a href="forgot-password.html" style="font-size:0.8rem;color:var(--primary);">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn--primary btn--full btn--lg">Sign In</button>

      <div class="auth-divider" style="text-align:center;font-size:0.8rem;">— or continue with —</div>

      <div class="auth-socials">
        <button type="button" class="btn btn--ghost"><i class="fa-brands fa-google"></i> Google</button>
        <button type="button" class="btn btn--ghost"><i class="fa-brands fa-discord"></i> Discord</button>
      </div>
    </form>

    <p class="auth-note" style="text-align:center;margin-top:24px;font-size:0.9rem;">Don't have an account? <a href="create-account.html" style="color:var(--primary);">Create one free</a></p>
  </div>
</div>
<script src="../assets/js/main.js"></script>
</body>
</html>
